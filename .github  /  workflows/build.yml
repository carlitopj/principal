name: Build APK Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Criar projeto Flutter base
        run: |
          flutter create --org com.gestortarefas --project-name gestor_tarefas temp_project
          cp lib/main.dart temp_project/lib/main.dart
          cp pubspec.yaml temp_project/pubspec.yaml

      - name: Instalar dependências
        working-directory: temp_project
        run: flutter pub get

      - name: Compilar APK
        working-directory: temp_project
        run: flutter build apk --release

      - name: Publicar APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: GestorTarefas-APK
          path: temp_project/build/app/outputs/flutter-apk/app-release.apk
