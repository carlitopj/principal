name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Aumentar espaço de swap (CRÍTICO para evitar Broken pipe)
        run: |
          sudo swapoff -a
          sudo fallocate -l 5G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          sudo swapon --show

      - name: Instalar dependências do sistema
        run: |
          sudo apt update
          sudo apt install -y build-essential libsqlite3-dev sqlite3 bzip2 libbz2-dev zlib1g-dev \
          libgdbm-dev libncurses5-dev libssl-dev libffi-dev readline-common libreadline-dev \
          libdb5.3-dev libgdbm-compat-dev libexpat1-dev liblzma-dev tar \
          libtool autoconf automake pkg-config
          sudo apt install -y openjdk-11-jdk curl unzip zip
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Aceitar licenças do Android SDK
        run: |
          mkdir -p ~/.android
          echo "count=0" > ~/.android/repositories.cfg
          yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses || true

      - name: Instalar SDK Manager necessário
        run: |
          $ANDROID_HOME/tools/bin/sdkmanager "build-tools;31.0.0" || true
          $ANDROID_HOME/tools/bin/sdkmanager "platforms;android-31" || true
          $ANDROID_HOME/tools/bin/sdkmanager "ndk;25.1.8937393" || true

      - name: Limpar cache antigo (evita builds corrompidas)
        run: |
          rm -rf ~/.buildozer
          rm -rf .buildozer
          rm -rf ~/.gradle

      - name: Compilar APK com buildozer
        run: |
          buildozer -v android debug
        timeout-minutes: 90
        env:
          JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64
          ANDROID_SDK_ROOT: ${{ github.workspace }}/.buildozer/android/platform/android-sdk
          ANDROID_NDK_ROOT: ${{ github.workspace }}/.buildozer/android/platform/android-ndk-25.1.8937393

      - name: Verificar se APK foi gerado
        run: |
          if [ -f "bin/gestor_tarefas-0.1-debug.apk" ]; then
            echo "✅ APK gerado com sucesso!"
            ls -lh bin/
          else
            echo "❌ APK não foi gerado"
            find bin/ -type f 2>/dev/null || echo "Diretório bin vazio"
            exit 1
          fi

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: bin/*.apk
          retention-days: 30

      - name: Mostrar resumo
        if: always()
        run: |
          echo "=== Resumo da Build ==="
          echo "Status: ${{ job.status }}"
          echo "Timestamp: $(date)"