name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:   # permite rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Instalar dependências
        run: |
          sudo apt update
          sudo apt install -y python3-pip openjdk-17-jdk unzip git
          pip install buildozer cython

      - name: Inicializar Buildozer
        run: |
          if [ ! -f buildozer.spec ]; then buildozer init; fi

      - name: Compilar APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4   # atualizado para v4
        with:
          name: app-apk
          path: bin/*.apk
