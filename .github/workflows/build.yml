name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Aumentar espaço de swap (CRÍTICO para evitar Broken pipe)
        run: |
          sudo swapoff -a
          sudo fallocate -l 5G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          sudo swapon --show

      - name: Instalar dependências do sistema
        run: |
          sudo apt update
          sudo apt install -y build-essential libsqlite3-dev sqlite3 bzip2 libbz2-dev zlib1g-dev \
          libgdbm-dev libncurses5-dev libssl-dev libffi-dev readline-common libreadline-dev \
          libdb5.3-dev libgdbm-compat-dev libexpat1-dev liblzma-dev tar \
          libtool autoconf automake pkg-config
          sudo apt install -y openjdk-11-jdk curl unzip zip
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Limpar cache antigo (evita builds corrompidas)
        run: |
          rm -rf ~/.buildozer
          rm -rf .buildozer
          rm -rf ~/.gradle

      - name: Cache Buildozer (apenas para downloads)
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Compilar APK
        run: |
          buildozer -v android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64
          ANDROID_SDK_ROOT: ${{ github.workspace }}/.buildozer/android/platform/android-sdk
          ANDROID_NDK_ROOT: ${{ github.workspace }}/.buildozer/android/platform/android-ndk-25b

      - name: Verificar se APK foi gerado
        run: |
          if [ -f "bin/gestor_tarefas-0.1-debug.apk" ]; then
            echo "✅ APK gerado com sucesso!"
            ls -lh bin/
          else
            echo "❌ APK não foi gerado"
            ls -lh bin/ || echo "Diretório bin vazio"
            exit 1
          fi

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: bin/*.apk
          retention-days: 30

      - name: Mostrar resumo
        if: always()
        run: |
          echo "=== Resumo da Build ==="
          echo "Status: ${{ job.status }}"
          echo "Timestamp: $(date)"