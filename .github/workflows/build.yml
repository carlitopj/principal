name: Build APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter create --org com.gestortarefas --project-name gestor_tarefas app
      - run: cp lib/main.dart app/lib/main.dart
      - run: cp pubspec.yaml app/pubspec.yaml
      - run: cd app && flutter pub get
      - run: cd app && flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: GestorTarefas-APK
          path: app/build/app/outputs/flutter-apk/app-release.apk
